rules.selection_line3=Presets can use Selected rows, All visible rows, or All discovered windows.
rules.filters_header=Filters
rules.filters_line1=Top filters support wildcard matching for title and process.
rules.filters_line2=Example: process *chrome* and title *messenger*.
rules.layouts_header=Layouts
rules.layouts_line1=Grid presets use the selected scope and fill a tile grid.
rules.layouts_line2=Split presets route AG windows to the left grid and matching right-side windows to the right stack.
rules.layouts_line3=Left grid supports nested tile sizes such as 3x3 with a 2/3 split.
rules.activation_header=Activation
rules.activation_line1=Each preset can require an external monitor, a resolution class and a specific deviceName.
rules.activation_line2=If the required monitor is not connected, the preset is disabled in toolbar and tray.
rules.activation_line3=When active, the preset uses the first matching monitor as its target.
rules.spacing_header=Spacing
rules.spacing_line1=window_gap_px controls the gap between arranged windows and column edges.
rules.ordering_header=Ordering
rules.ordering_line1=Matching order follows system z-order after filtering.
